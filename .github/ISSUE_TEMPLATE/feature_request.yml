name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        What would make AgentSquad better for you? Be specific.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New agent role / SKILL.md
        - New script
        - New make target
        - Makefile improvement
        - Documentation
        - Alternative LLM support (OpenAI, Ollama, etc.)
        - CI/CD integration
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that the current system doesn't support?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would the solution look like?
      description: Be specific. Include example commands, SKILL.md excerpts, or script sketches if you have them.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: What alternatives have you tried?
      description: Workarounds you've found, related tools, etc.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this
