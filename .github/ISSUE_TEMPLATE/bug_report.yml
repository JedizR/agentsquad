name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Fill in what you can — the more specific, the faster we can fix it.

  - type: input
    id: agentsquad_version
    attributes:
      label: AgentSquad version
      description: Run `cat ~/.agent-team/VERSION` or check the git tag
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: gemini_cli_version
    attributes:
      label: Gemini CLI version
      description: Run `gemini --version`
      placeholder: "0.1.x"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (Ubuntu/Debian)
        - Linux (other)
        - Windows (WSL2)
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Which component is broken?
      options:
        - setup.sh
        - health-check.sh
        - gemini-call.sh
        - strip-filler.sh
        - rotate-key.sh
        - migrate.sh
        - Makefile
        - SKILL.md activation
        - init-agent-team skill
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Include the exact command you ran and the full error output
      placeholder: |
        Command: make backend TASK="implement users API"
        Error: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run setup.sh
        2. Set GEMINI_API_KEY
        3. Run make backend TASK="..."
        4. See error

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: shellcheck output, relevant env vars (redact API keys), etc.
